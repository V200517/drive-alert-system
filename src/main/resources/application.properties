spring.application.name=drivealert

spring.datasource.url=jdbc:h2:mem:drivealert;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

jwt.secret=ChangeThisJwtSecretToAStrongValue
jwt.expiration-ms=86400000

app.storage.drive-pdf-dir=uploads/drive-pdfs
app.admin.registration-key=DriveAlertAdmin2026
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
